name: Update GitHub Language Metrics

on:
  schedule:
    - cron: "0 0 * * *"   
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics to Gist
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.STATS_TOKEN }}
          output_action: gist
          committer_gist: ${{ secrets.GIST_ID }}
          filename: languages.json
          config_output: json
          repositories_skipped: Trash
          base: ""
          plugin_languages: yes
          plugin_languages_details: percentage
